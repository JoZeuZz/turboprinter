name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Compile Python sources
        run: uv run python -m compileall app cli.py main.py webui test

      - name: Run deterministic unit tests
        run: uv run python -X utf8 -m unittest test.services.test_state test.services.test_task test.services.test_schema test.services.test_webui_i18n

      - name: Run Personal Quality Stack tests
        run: >-
          uv run python -X utf8 -m unittest
          test.services.test_quality_content_package
          test.services.test_quality_library_cli
          test.services.test_quality_local_library
          test.services.test_quality_manifest
          test.services.test_quality_material_ranker
          test.services.test_quality_render
          test.services.test_quality_subtitles
          test.services.test_quality_tts_adapter
